<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetar Outbound & Container Tracking Dashboard</title>
    <!-- Tailwind CSS for modern responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono-custom {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbar for premium aesthetic */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f59e0b;
        }
        /* Realistic smooth ship floating animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-ship {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans antialiased pb-12">

    <!-- HEADER UTAMA -->
    <header class="sticky top-0 z-30 bg-slate-900/95 backdrop-blur border-b border-slate-800 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="p-2 bg-amber-500 rounded-xl text-slate-950 font-extrabold text-xl tracking-wider shadow-md shadow-amber-500/20">W</span>
                <div>
                    <h1 class="font-bold text-base md:text-lg text-amber-500 tracking-wide flex items-center gap-1.5">
                        WETAR LOGISTICS
                        <span class="text-[10px] bg-slate-800 text-slate-300 font-mono-custom py-0.5 px-2 rounded-full border border-slate-700">TRACKER</span>
                    </h1>
                    <p class="text-[10px] md:text-xs text-slate-400">Sistem Manifes & Pelacakan Logistik Terpadu</p>
                </div>
            </div>

            <!-- Search bar desktop -->
            <div class="hidden md:flex items-center space-x-2 flex-1 max-w-md mx-8">
                <div class="relative w-full">
                    <input
                        type="text"
                        id="desktopSearchInput"
                        placeholder="Cari ID, No Kontainer, atau Nama Barang..."
                        class="w-full bg-slate-950 text-slate-100 rounded-lg pl-10 pr-4 py-2 border border-slate-800 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all text-sm"
                    />
                    <div class="absolute left-3 top-2.5 text-slate-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                </div>
            </div>

            <div>
                <button
                    onclick="openAddModal()"
                    class="flex items-center space-x-1.5 px-3 py-2 md:px-4 md:py-2.5 bg-amber-500 text-slate-950 font-bold rounded-lg hover:bg-amber-400 active:scale-95 transition-all shadow-lg shadow-amber-500/15 text-xs md:text-sm"
                >
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
                    <span>Outbound Baru</span>
                </button>
            </div>
        </div>
    </header>

    <!-- SEARCH BAR MOBILE -->
    <div class="p-4 md:hidden border-b border-slate-900 bg-slate-900/50">
        <div class="relative w-full">
            <input
                type="text"
                id="mobileSearchInput"
                placeholder="Cari ID, Kontainer, atau Barang..."
                class="w-full bg-slate-950 text-slate-100 rounded-lg pl-10 pr-4 py-2 border border-slate-800 focus:outline-none focus:border-amber-500 text-sm"
            />
            <div class="absolute left-3 top-2.5 text-slate-500">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- RINGKASAN METRIK DASHBOARD -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <!-- Widget Total Outbound -->
            <div class="bg-gradient-to-br from-slate-900 to-slate-950 p-4 rounded-xl border border-slate-800 shadow-sm relative overflow-hidden">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Total Outbound</p>
                <div class="flex items-baseline justify-between mt-1">
                    <span id="metricTotal" class="text-2xl font-extrabold text-white">0</span>
                    <span class="text-[10px] text-slate-500 font-semibold">Kargo Terdaftar</span>
                </div>
                <div class="h-1 w-full bg-slate-800 rounded-full mt-3 overflow-hidden">
                    <div class="h-full bg-amber-500" style="width: 100%"></div>
                </div>
            </div>

            <!-- Widget In Transit -->
            <div class="bg-gradient-to-br from-slate-900 to-slate-950 p-4 rounded-xl border border-slate-800 shadow-sm">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Sedang Transit / Layar</p>
                <div class="flex items
